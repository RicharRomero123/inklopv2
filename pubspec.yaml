name: inklop_v1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Iconos y Estilo
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0


  # Renderizado de Guiones de IA
  flutter_markdown: ^0.7.1

  # Autenticación y Almacenamiento Seguro
  auth0_flutter: ^1.14.0
  flutter_secure_storage: ^10.0.0

  # Networking y API
  http: ^1.6.0

  # Manejo de Imágenes (Perfil y Cloudinary)
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 🚀 CONFIGURACIÓN DE ASSETS CORREGIDA
  assets:
    - assets/images/
    # Si vas a usar animaciones Lottie o fuentes luego, las agregarías aquí abajo.

  # Si en el futuro agregas fuentes personalizadas, descomenta esto:
  # fonts:
  #   - family: Montserrat
  #     fonts:
  #       - asset: assets/fonts/Montserrat-Regular.ttf
  #       - asset: assets/fonts/Montserrat-Bold.ttf
  #         weight: 700